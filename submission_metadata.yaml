ai_tools_used:
  - "Claude"
  - "Gemini"

ai_usage_summary: |
  Used Claude (Anthropic) throughout for architecture design, code generation,
  and iterative debugging of the ranking pipeline (honeypot detection, scoring
  logic, template-catalog discovery). All code was reviewed, tested, and run
  by the team against the actual candidate pool at each step; no candidate
  data was sent to any external LLM API as part of the ranking pipeline
  itself — rank.py uses only a locally-cached sentence-transformers model
  with no network calls during ranking.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Modular, production-ready multi-stage ranker: (1) Rule-based honeypot filter 
  catching internally inconsistent profiles — skill duration exceeding total 
  experience, expert proficiency with near-zero use, chronological mismatches; 
  (2) Semantic retrieval via sentence-transformers (all-MiniLM-L6-v2) 
  embeddings, precomputed offline; (3) An O(1) template-based production-evidence 
  score — full-pool analysis showed all 100K candidates' career descriptions 
  are drawn from exactly 44 reused templates, so we hand-labeled all 44 
  against the JD's criteria and use exact-match mapping; (4) Plain-language 
  fallback boosts and anti-pattern penalties; (5) A multiplicative behavioral 
  modifier from redrob_signals (recency, responsiveness). Final score blends 
  semantic similarity (45%) and rule score (55%), multiplied by behavioral 
  modifiers and structural integrity checks. Architecture is decoupled via 
  YAML configs and defensively tested. Runtime is highly optimized via NumPy 
  vectorization, processing 100K candidates in ~30-55 seconds on a local CPU.

